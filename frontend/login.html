<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fluxxi2 — Acceso</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; }

    .login-wrap {
      width: 100%;
      max-width: 420px;
      padding: 1rem;
    }

    .login-logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: .6rem;
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--blue);
      margin-bottom: 2rem;
    }

    .login-logo svg { width: 36px; height: 36px; }

    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
    }

    .tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      border-bottom: 1px solid var(--border);
    }

    .tab-btn {
      padding: 1rem;
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: .9rem;
      font-weight: 500;
      cursor: pointer;
      font-family: inherit;
      transition: all .15s;
      border-bottom: 2px solid transparent;
    }

    .tab-btn.active {
      color: var(--blue);
      border-bottom-color: var(--blue);
      background: rgba(59,130,246,.05);
    }

    .tab-pane { display: none; padding: 1.75rem; }
    .tab-pane.active { display: block; }

    .login-title {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 1.25rem;
      color: var(--text);
    }

    .login-subtitle {
      font-size: .8rem;
      color: var(--text-muted);
      margin-bottom: 1.25rem;
    }

    .form-group { margin-bottom: 1rem; }

    .error-msg {
      color: var(--red);
      font-size: .825rem;
      margin-top: .75rem;
      display: none;
    }

    .error-msg.show { display: block; }

    select.form-select {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 8px;
      padding: .65rem .85rem;
      font-size: .9rem;
      font-family: inherit;
      cursor: pointer;
    }

    select.form-select:focus { outline: none; border-color: var(--blue); }

    .btn-full { width: 100%; justify-content: center; padding: .75rem; font-size: .95rem; }

    .admin-icon { font-size: 2rem; text-align: center; margin-bottom: 1rem; }
  </style>
</head>
<body>

<div class="login-wrap">
  <div class="login-logo">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M5 17H3a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11a2 2 0 0 1 2 2v3"/>
      <rect x="9" y="11" width="14" height="10" rx="2"/>
      <circle cx="12" cy="16" r="1"/><circle cx="20" cy="16" r="1"/>
    </svg>
    Fluxxi2
  </div>

  <div class="login-card">
    <div class="tabs">
      <button class="tab-btn active" data-tab="empleado">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:middle;margin-right:.35rem"><circle cx="12" cy="7" r="4"/><path d="M5.5 21a8.38 8.38 0 0 1 13 0"/></svg>
        Empleado
      </button>
      <button class="tab-btn" data-tab="admin">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:middle;margin-right:.35rem"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
        Administrador
      </button>
    </div>

    <!-- TAB EMPLEADO -->
    <div class="tab-pane active" id="tab-empleado">
      <p class="login-title">Ingresar como empleado</p>
      <p class="login-subtitle">Selecciona tu nombre para continuar</p>
      <div class="form-group">
        <label class="form-group" style="font-size:.8rem;font-weight:500;color:var(--text-muted);text-transform:uppercase;letter-spacing:.04em;margin-bottom:.4rem;display:block">Domiciliario</label>
        <select id="driverSelect" class="form-select">
          <option value="">Cargando...</option>
        </select>
      </div>
      <div id="driverError" class="error-msg"></div>
      <button class="btn btn-primary btn-full" style="margin-top:.5rem" id="btnLoginDriver">Ingresar</button>
    </div>

    <!-- TAB ADMIN -->
    <div class="tab-pane" id="tab-admin">
      <div class="admin-icon">🔐</div>
      <p class="login-title">Acceso de administrador</p>
      <div class="form-group">
        <label style="font-size:.8rem;font-weight:500;color:var(--text-muted);text-transform:uppercase;letter-spacing:.04em;margin-bottom:.4rem;display:block">Clave</label>
        <input type="password" id="adminPassword" class="form-group" placeholder="••••••••"
          style="width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:.65rem .85rem;font-size:.9rem;font-family:inherit;"
          autocomplete="current-password" />
      </div>
      <div id="adminError" class="error-msg"></div>
      <button class="btn btn-primary btn-full" style="margin-top:.5rem" id="btnLoginAdmin">Entrar</button>
    </div>
  </div>
</div>

<script>
const API = '';

// Tabs
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById(`tab-${btn.dataset.tab}`).classList.add('active');
  });
});

// Load drivers
async function loadDrivers() {
  const sel = document.getElementById('driverSelect');
  try {
    const res = await fetch(`${API}/api/drivers`);
    const drivers = await res.json();
    if (!drivers.length) {
      sel.innerHTML = '<option value="">Sin domiciliarios registrados</option>';
      return;
    }
    sel.innerHTML = '<option value="">— Selecciona tu nombre —</option>' +
      drivers.map(d => `<option value="${d.id}">${d.name} ${d.status === 'Offline' ? '(inactivo)' : '✓'}</option>`).join('');
  } catch {
    sel.innerHTML = '<option value="">Error al cargar</option>';
  }
}

loadDrivers();

// Login driver
document.getElementById('btnLoginDriver').addEventListener('click', async () => {
  const driverId = document.getElementById('driverSelect').value;
  const errEl = document.getElementById('driverError');
  errEl.classList.remove('show');

  if (!driverId) { errEl.textContent = 'Selecciona un domiciliario'; errEl.classList.add('show'); return; }

  const res = await fetch(`${API}/api/auth/driver`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ driverId: parseInt(driverId) }),
  });
  const data = await res.json();
  if (res.ok) {
    sessionStorage.setItem('fluxxi_role', 'driver');
    sessionStorage.setItem('fluxxi_driver', JSON.stringify(data.driver));
    window.location.href = 'waiting.html';
  } else {
    errEl.textContent = data.error || 'Error al ingresar';
    errEl.classList.add('show');
  }
});

// Login admin
document.getElementById('adminPassword').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('btnLoginAdmin').click();
});

document.getElementById('btnLoginAdmin').addEventListener('click', async () => {
  const password = document.getElementById('adminPassword').value;
  const errEl = document.getElementById('adminError');
  errEl.classList.remove('show');

  const res = await fetch(`${API}/api/auth/admin`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ password }),
  });
  const data = await res.json();
  if (res.ok) {
    sessionStorage.setItem('fluxxi_role', 'admin');
    window.location.href = 'dashboard.html';
  } else {
    errEl.textContent = data.error || 'Clave incorrecta';
    errEl.classList.add('show');
  }
});
</script>
</body>
</html>
