<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fluxxi2 — Esperando aprobación</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .waiting-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2.5rem 2rem;
      max-width: 400px;
      width: 100%;
      margin: 1rem;
      text-align: center;
    }

    .spinner {
      width: 56px;
      height: 56px;
      border: 4px solid var(--border);
      border-top-color: var(--blue);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 1.5rem;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .waiting-name {
      font-size: 1.3rem;
      font-weight: 700;
      margin-bottom: .4rem;
    }

    .waiting-sub {
      color: var(--text-muted);
      font-size: .9rem;
      margin-bottom: 1.75rem;
      line-height: 1.5;
    }

    .waiting-dots span {
      display: inline-block;
      width: 8px; height: 8px;
      background: var(--blue);
      border-radius: 50%;
      margin: 0 3px;
      animation: bounce 1.2s infinite;
    }

    .waiting-dots span:nth-child(2) { animation-delay: .2s; }
    .waiting-dots span:nth-child(3) { animation-delay: .4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0.6); opacity: .4; }
      40% { transform: scale(1); opacity: 1; }
    }

    .session-closed {
      display: none;
    }

    .session-closed .icon {
      font-size: 2.5rem;
      margin-bottom: 1rem;
    }
  </style>
</head>
<body>

  <script>
    if (sessionStorage.getItem('fluxxi_role') !== 'driver') {
      window.location.href = 'login.html';
    }
  </script>

  <div class="waiting-card" id="waitingView">
    <div class="spinner"></div>
    <div class="waiting-name" id="driverNameDisplay">—</div>
    <p class="waiting-sub">
      Tu solicitud de turno fue enviada.<br>
      Espera a que el administrador te dé inicio.
    </p>
    <div class="waiting-dots">
      <span></span><span></span><span></span>
    </div>
    <button class="btn btn-ghost" style="margin-top:1.75rem;width:100%" id="btnCancel">Cancelar</button>
  </div>

  <div class="waiting-card session-closed" id="closedView">
    <div class="icon">🔒</div>
    <div class="waiting-name">Sesión cerrada</div>
    <p class="waiting-sub">El administrador cerró tu sesión.</p>
    <button class="btn btn-primary" style="width:100%;margin-top:.5rem" onclick="window.location.href='login.html'">Volver al inicio</button>
  </div>

  <div class="toast-container" id="toastContainer"></div>

  <script>
    const API = '';
    var driver = JSON.parse(sessionStorage.getItem('fluxxi_driver') || 'null');
    if (!driver) window.location.href = 'login.html';

    document.getElementById('driverNameDisplay').textContent = driver.name;

    document.getElementById('btnCancel').addEventListener('click', function() {
      fetch(API + '/api/drivers/' + driver.id + '/offline', { method: 'PATCH' }).catch(function(){});
      sessionStorage.clear();
      window.location.href = 'login.html';
    });

    // Polling cada 3 segundos
    var pollInterval = setInterval(async function() {
      try {
        var res = await fetch(API + '/api/drivers/' + driver.id);
        var data = await res.json();

        if (data.status === 'Available' || data.status === 'Busy') {
          clearInterval(pollInterval);
          // Actualizar driver en sesión con datos frescos
          sessionStorage.setItem('fluxxi_driver', JSON.stringify(data));
          window.location.href = 'worker.html';
        } else if (data.status === 'Offline') {
          clearInterval(pollInterval);
          document.getElementById('waitingView').style.display = 'none';
          document.getElementById('closedView').style.display = 'block';
        }
      } catch(e) {}
    }, 3000);
  </script>
</body>
</html>
