<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Fluxxi2 — Mi turno</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    body {
      overflow-x: hidden;
    }

    header {
      padding: .75rem 1rem;
    }

    header .logo {
      font-size: 1rem;
    }

    header .logo svg {
      width: 22px;
      height: 22px;
    }

    main {
      padding: .75rem;
    }

    .worker-header-info {
      display: flex;
      align-items: center;
      gap: .6rem;
    }

    .worker-avatar {
      width: 34px;
      height: 34px;
      background: var(--surface2);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: .85rem;
      color: var(--blue);
      flex-shrink: 0;
    }

    .worker-name-block {
      line-height: 1.3;
    }

    .worker-name-block .name {
      font-weight: 600;
      font-size: .9rem;
    }

    .gps-status {
      font-size: .7rem;
      display: flex;
      align-items: center;
      gap: .3rem;
      color: var(--text-muted);
    }

    .gps-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--text-muted);
      flex-shrink: 0;
    }

    .gps-dot.active {
      background: var(--green);
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: .4;
      }
    }

    .order-item {
      padding: .9rem 1rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: .5rem;
    }

    .order-item:last-child {
      border-bottom: none;
    }

    .order-item-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: .5rem;
    }

    .order-meta {
      flex: 1;
      min-width: 0;
    }

    .order-code-line {
      display: flex;
      align-items: center;
      gap: .5rem;
      flex-wrap: wrap;
      margin-bottom: .2rem;
    }

    .order-customer {
      font-weight: 600;
      font-size: .9rem;
    }

    .order-phone {
      display: inline-flex;
      align-items: center;
      gap: .3rem;
      color: var(--blue);
      font-size: .85rem;
      font-weight: 500;
      text-decoration: none;
      background: rgba(59, 130, 246, .1);
      padding: .15rem .5rem;
      border-radius: 999px;
    }

    .order-item-address {
      font-size: .82rem;
      color: var(--text-muted);
      display: flex;
      align-items: flex-start;
      gap: .35rem;
      line-height: 1.4;
    }

    .order-item-actions {
      display: flex;
      gap: .5rem;
      flex-wrap: wrap;
    }

    .action-btn-main {
      flex: 1;
      min-width: 100px;
      padding: .6rem 1rem;
      font-size: .875rem;
      justify-content: center;
      border-radius: 8px;
    }

    .no-orders {
      padding: 2.5rem 1rem;
      text-align: center;
      color: var(--text-muted);
    }

    @media (min-width: 640px) {
      header {
        padding: 1rem 2rem;
      }

      main {
        padding: 1.5rem 2rem;
      }

      .order-item {
        padding: 1rem 1.25rem;
      }
    }
  </style>
</head>

<body>

  <script>
    if (sessionStorage.getItem('fluxxi_role') !== 'driver') {
      window.location.href = 'login.html';
    }
  </script>

  <header>
    <div class="logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
        stroke-linejoin="round">
        <path d="M5 17H3a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11a2 2 0 0 1 2 2v3" />
        <rect x="9" y="11" width="14" height="10" rx="2" />
        <circle cx="12" cy="16" r="1" />
        <circle cx="20" cy="16" r="1" />
      </svg>
      Fluxxi2
    </div>
    <div class="actions">
      <div class="worker-header-info">
        <div class="worker-avatar" id="workerInitials">?</div>
        <div class="worker-name-block">
          <div class="name" id="workerName">--</div>
          <div class="gps-status">
            <span class="gps-dot" id="gpsDot"></span>
            <span id="gpsLabel">GPS inactivo</span>
          </div>
        </div>
      </div>
      <button class="btn btn-ghost btn-sm" id="btnLogout">Salir</button>
    </div>
  </header>

  <main>
    <div class="panel">
      <div class="panel-header">
        <h2>Mis pedidos</h2>
        <span class="count" id="myOrdersCount">0</span>
      </div>
      <div id="myOrdersList">
        <div class="no-orders">Cargando pedidos...</div>
      </div>
    </div>
  </main>

  <div class="toast-container" id="toastContainer"></div>

  <script src="worker.js"></script>
</body>

</html>
